name: ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # the release job uploads assets

jobs:
  build:
    name: test + build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04, arch: linux-x86_64 }
          - { runner: ubuntu-24.04-arm, arch: linux-arm64 } # for GB10-class ARM boxes
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      # Odin only — NO CUDA toolkit and NO GPU are needed to build a GPU-capable
      # binary: the CUDA driver is dlopen'd at runtime, and the kernel is embedded
      # from the committed portable fatbin (cuda/kernel.cubin). Pin `release` to a
      # known-good Odin nightly for reproducible builds.
      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          release: nightly
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: |
          odin test .
          odin test sha256d
          odin test keygen

      - name: Build
        run: odin build cli -out:grotti-${{ matrix.arch }} -o:speed -define:GROTTI_VERSION=${{ github.ref_type == 'tag' && github.ref_name || '0.1.0-dev' }}

      - name: Smoke-check (prints usage, exits — no pool, no GPU)
        run: ./grotti-${{ matrix.arch }} -help || true

      - uses: actions/upload-artifact@v4
        with:
          name: grotti-${{ matrix.arch }}
          path: grotti-${{ matrix.arch }}

  # NOTE: there is no CUDA job. The kernel ships as the committed portable fatbin at
  # cuda/kernel.cubin (embedded via #load), so CI needs no CUDA toolkit. Rebuild the
  # fatbin manually if you edit cuda/kernel.cu — the command is in README / kernel.cu
  # (needs CUDA 13 for sm_121, but no GPU).

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
